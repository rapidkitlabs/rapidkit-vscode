name: extension-smoke-matrix

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        if: runner.os != 'Windows'
        run: npm run format:check

      - name: Compile
        run: npm run compile

      - name: Contract drift smoke
        run: npm run test:watch -- --run src/test/driftGuard.test.ts

      - name: Shared parity contract snapshot
        run: npm run test:parity-contract

      - name: Release stop gate (contract/parity)
        run: npm run release:stop-gate -- --marker releases/wave3-kpi-marker.json --marker-max-age-hours 100000 --claim-checklist releases/wave3-claim-checklist.md --enforce-claim-checklist --enterprise-gate releases/wave3-enterprise-gate.json --enforce-enterprise-freeze --release-notes releases/release-posture-label.md --enforce-release-posture-label
